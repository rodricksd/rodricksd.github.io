<html lang="en">
<head>
  <meta charset="utf-8" />

  <title>Color Palette Preview — Deandra Lauren Rodricks</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Lato', sans-serif;
      background: #0e0e0e;
      color: #fff;
      padding: 40px 24px 60px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      font-weight: 300;
      letter-spacing: 0.14em;
      text-align: center;
      margin-bottom: 8px;
      color: #e8e4de;
    }
    .page-sub {
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 52px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 28px;
      max-width: 1500px;
      margin: 0 auto;
    }

    /* ── palette card shell ── */
    .palette {
      border-radius: 3px;
      overflow: hidden;
      box-shadow: 0 6px 36px rgba(0,0,0,0.55);
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }
    .palette:hover {
      transform: translateY(-5px);
      box-shadow: 0 18px 56px rgba(0,0,0,0.65);
    }

    /* header strip */
    .p-header {
      padding: 14px 20px 12px;
      background: #181818;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .p-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 400;
      letter-spacing: 0.07em;
      color: #e8e4de;
    }
    .p-header .tone {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #555;
    }

    /* simulated nav */
    .p-nav {
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .p-nav-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      letter-spacing: 0.07em;
    }
    .p-nav-links {
      display: flex;
      gap: 16px;
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.65;
    }

    /* hero */
    .p-hero {
      padding: 28px 20px 20px;
    }
    .p-hero-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.45rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      margin-bottom: 5px;
    }
    .p-hero-title {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .p-hero-rule {
      height: 1px;
      width: 40px;
      margin-bottom: 14px;
    }
    .p-hero-bio {
      font-size: 12.5px;
      line-height: 1.7;
      opacity: 0.75;
    }

    /* cards row */
    .p-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 16px 20px;
    }
    .p-card {
      border-radius: 2px;
      padding: 12px 14px;
    }
    .p-card-tag {
      font-size: 8.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .p-card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 5px;
    }
    .p-card-body {
      font-size: 10.5px;
      line-height: 1.6;
      opacity: 0.65;
    }

    /* swatches */
    .p-swatches {
      display: flex;
      gap: 8px;
      padding: 14px 20px 16px;
      flex-wrap: wrap;
    }
    .swatch {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .swatch-dot {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .swatch-hex {
      font-size: 8px;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.04em;
      color: #ccc;
    }
    .swatch-lbl {
      font-size: 8px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #666;
    }

    /* pick button */
    .pick-btn {
      display: block;
      margin: 0 20px 20px;
      padding: 10px;
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      border-radius: 2px;
      cursor: pointer;
      background: transparent;
      font-family: 'Lato', sans-serif;
      transition: opacity 0.15s;
    }
    .pick-btn:hover { opacity: 0.6; }

    .footer-note {
      text-align: center;
      margin-top: 48px;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #3a3a3a;
    }
  </style>
</head>

function isDark(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (0.299*r + 0.587*g + 0.114*b) < 128;
}

function renderPalette(p) {
  const isBodyDark = isDark(p.body.bg);

  const navHtml = `
    <div class="p-nav" style="background:${p.nav.bg}; color:${p.nav.text};">
      <span class="p-nav-brand">Deandra L. Rodricks</span>
      <span class="p-nav-links">
        <span>About</span><span>Projects</span><span>Contact</span>
      </span>
    </div>`;

  const accentColor = p.accentB ?? p.accent;
  const tagColor = p.accent;

  const heroHtml = `
    <div class="p-hero" style="background:${p.body.bg}; color:${p.body.text};">
      <div class="p-hero-name">Deandra Lauren Rodricks</div>
      <div class="p-hero-title" style="color:${tagColor};">AI &amp; Cybersecurity Strategist</div>
      <div class="p-hero-rule" style="background:${p.accent};"></div>
      <div class="p-hero-bio">Bridging enterprise security and intelligent systems — with the precision, elegance, and authority luxury demands.</div>
    </div>`;

  const cardsHtml = `
    <div class="p-cards" style="background:${p.body.bg};">
      <div class="p-card" style="background:${p.card.bg}; border:1px solid ${p.card.border}; color:${p.body.text};">
        <div class="p-card-tag" style="color:${tagColor};">Featured</div>
        <div class="p-card-title">AI Risk Framework</div>
        <div class="p-card-body">Enterprise threat modeling for generative AI.</div>
      </div>
      <div class="p-card" style="background:${p.card.bg}; border:1px solid ${p.card.border}; color:${p.body.text};">
        <div class="p-card-tag" style="color:${tagColor};">Management</div>
        <div class="p-card-title">Team Leadership</div>
        <div class="p-card-body">High-performance cross-functional teams.</div>
      </div>
    </div>`;

  const swatchDots = p.swatches.map(s => `
    <div class="swatch">
      <div class="swatch-dot" style="background:${s.color};"></div>
      <div class="swatch-hex">${s.hex}</div>
      <div class="swatch-lbl">${s.lbl}</div>
    </div>`).join('');

  const swatchesBg = isBodyDark ? p.card.bg : p.nav.bg;
  const swatchesHtml = `
    <div class="p-swatches" style="background:${swatchesBg};">${swatchDots}</div>`;

  const btnColor = p.accent;
  const btnBorder = isBodyDark
    ? `border:1px solid ${p.accent}; color:${p.accent}; background:${p.body.bg};`
    : `border:1px solid ${p.accent}; color:${p.accent}; background:${p.body.bg};`;
  const btnHtml = `<button class="pick-btn" style="${btnBorder}" onclick="alert('You selected: ${p.name}')">Select This Palette</button>`;

  return `
    <div class="palette">
      <div class="p-header">
        <h2>${p.name}</h2>
        <span class="tone">${p.tone}</span>
      </div>
      ${navHtml}
      ${heroHtml}
      ${cardsHtml}
      ${swatchesHtml}
      ${btnHtml}
    </div>`;
}
