<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#F7F3EC"/>
  <rect x="72" y="72" width="1056" height="486" rx="4" fill="#FFFFFF"/>
  <rect x="72" y="72" width="1056" height="486" rx="4" fill="none" stroke="#E2D5C8" stroke-width="2"/>
  <rect x="72" y="72" width="8" height="486" fill="#A53030"/>

  <text x="132" y="126" font-family="Lato, Arial, sans-serif" font-size="15" font-weight="900" letter-spacing="2.2" fill="#A53030">ARTICLE SERIES &#183; BEING SheEO</text>
  <line x1="132" y1="158" x2="1068" y2="158" stroke="#E2D5C8" stroke-width="2"/>

  <text x="132" y="237" font-family="Lato, Arial, sans-serif" font-size="42" font-weight="900" fill="#1B263B">
    <tspan x="132" dy="0">The title CEO is one I love.</tspan>
    <tspan x="132" dy="56">But SheEO? That one actually fits.</tspan>
  </text>

  <text x="132" y="365" font-family="Lato, Arial, sans-serif" font-size="25" font-weight="400" fill="#1B263B">
    <tspan x="132" dy="0">I'm not here to solve every problem, I'm here to lead</tspan>
    <tspan x="132" dy="38">a team well enough that they feel empowered to solve them.</tspan>
    <tspan x="132" dy="38">It's a different kind of hard. And it's exhilarating in its own way.</tspan>
  </text>

  <line x1="132" y1="506" x2="230" y2="506" stroke="#C5A880" stroke-width="4"/>
  <text x="132" y="540" font-family="Lato, Arial, sans-serif" font-size="15" font-weight="900" letter-spacing="2" fill="#667085">DEANDRA LAUREN RODRICKS</text>
</svg>
